services:
  wvn_nvidia:
    # 兼容go2 arm64架构的容器构建
    container_name: wvn_jetson
    image: wvn:jetson-final

    network_mode: "host"
    runtime: nvidia

    stdin_open: true
    tty: true

    environment:
      - ROS_IP=127.0.0.1
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      # 源码挂载（保持和你原 docker-compose.yaml 一致），直接挂载到宿主机磁盘分区了，所有修改会直接操作宿主机(包括rm)
      - ../../wild_visual_navigation:/root/catkin_ws/src/wild_visual_navigation
      - ../../self_supervised_segmentation:/root/catkin_ws/src/self_supervised_segmentation

      # GUI / 显示（保持 docker-compose-gui.yaml 一致）
      - /dev/dri:/dev/dri
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw

    # 关键：up -d 时不秒退（保持容器常驻）
    command: ["bash", "-lc", "sleep infinity"]

